services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - ${DB_PORT:-5432}:5432
    volumes:
      - postgres:/var/lib/postgresql
    networks:
      - postgres-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PostgresConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-postgres};Username=${POSTGRES_USER:-admin};Password=${POSTGRES_PASSWORD:-123456};
    ports:
      - "${BACKEND_PORT:-5008}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - postgres-network
      - backend-network
    restart: unless-stopped
    
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NG_APP_API_URL: ${NG_APP_API_URL:-http://localhost:5008}
    ports:
      - "${CLIENT_PORT:-4200}:80"
    depends_on:
      - backend
    networks:
      - backend-network
    restart: unless-stopped
    
networks:
  postgres-network:
    driver: bridge
  backend-network:
    driver: bridge
    
volumes:
  postgres: