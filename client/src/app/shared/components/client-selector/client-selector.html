<div ngbDropdown class="d-inline-block">
  <button class="btn btn-outline-primary btn-sm" ngbDropdownToggle>
    {{ selected ? selected.name : placeholder }}
  </button>

  <div
    ngbDropdownMenu
    class="dropdown-menu-end p-0"
    style="min-width: 200px; position: relative; z-index: 1050"
  >
    <div
      class="overflow-auto"
      style="max-height: 300px"
      (scroll)="onDropdownScroll($event)"
    >
      <button ngbDropdownItem (click)="selectClient(null)">
        <span class="text-muted">All clients</span>
      </button>
      <div class="dropdown-divider m-0"></div>

      @let clients = clientService.clients$ | async;
      @for (client of clients; track client.id) {
        <button
          ngbDropdownItem
          [class.fw-semibold]="selected?.id === client.id"
          (click)="selectClient(client)"
        >
          {{ client.name }}
        </button>
      }

      @if (clientService.isLoading$ | async) {
        <div class="text-center py-2">
          <span class="spinner-border spinner-border-sm text-secondary"></span>
        </div>
      }
    </div>

    <div class="border-top">
      <button ngbDropdownItem (click)="openCreateClientModal()">
        + Add New Client
      </button>
    </div>
  </div>
</div>
